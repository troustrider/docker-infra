# Backend al que NGINX reenvía las peticiones.
# El hostname "backend" es el nombre del servicio en docker-compose.yml,
# resuelto por el DNS interno de Docker, no una IP fija.
upstream backend_upstream {
    server backend:8000;
}

# Rate limiting: como mucho 5 peticiones/segundo por IP, con un margen de
# ráfaga de 10 antes de empezar a rechazar. Protege la API de fuerza bruta.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# Todo el tráfico HTTP se redirige a HTTPS, nunca se sirve en texto plano.
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Archivos estáticos servidos directamente por NGINX, sin pasar por el backend.
    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    location / {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend_upstream;

        # Cabeceras para que el backend sepa quién hizo la petición original
        # y por qué protocolo/host, aunque quien le habla directamente sea NGINX.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
